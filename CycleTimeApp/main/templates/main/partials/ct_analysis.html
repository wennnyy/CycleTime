<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* Only keep pivot/table related styles here. Other layout and components use Tailwind utilities. */
.ct-tbl-wrap {
    overflow: auto;
    max-height: 360px;
}
.ct-tbl {
    border-collapse: collapse;
    font-size: 11.5px;
    width: max-content;
    min-width: 100%;
}
.ct-tbl thead th {
    position: sticky;
    top: 0;
    background: #f3f4f6;
    padding: 5px 9px;
    border: 1px solid #e5e7eb;
    font-weight: 600;
    white-space: nowrap;
    text-align: center;
    z-index: 2;
    color: #374151;
}
.ct-tbl thead th.lh { text-align: left; z-index: 3; }
.ct-tbl td {
    padding: 3px 9px;
    border: 1px solid #f0f0f0;
    white-space: nowrap;
    vertical-align: middle;
}
.ct-tbl td.lc  { text-align: left; }
.ct-tbl td.vc  { text-align: center; color: #1d4ed8; }
.ct-tbl td.nc  { text-align: center; color: #d1d5db; }
.ct-tbl td.gc  { text-align: center; background: #eff6ff; font-weight: 600; color: #1e40af; }
.ct-tbl tr.tr  { /* total row */ }
.ct-tbl tr.tr td { background: #f8fafc; font-size: 11px; color: #6b7280; font-style: italic; }
.ct-tbl tr.tr td.vc,
.ct-tbl tr.tr td.gc { color: #0369a1; font-weight: 700; font-style: normal; }
.ct-tbl td.pg-c  { background: #f0fdf4; font-weight: 700; position: sticky; left: 0; z-index: 1; }
.ct-tbl td.ar2-c { background: #eff6ff; font-weight: 700; position: sticky; left: 0; z-index: 1; }

.ct-nodata { padding: 32px; text-align: center; color: #9ca3af; font-size: 12px; }
</style>
<div id="ctWrap" class="mt-8">
    <div class="text-center text-xl font-bold text-gray-900 mb-3">Cycle Time Analysis Dashboard</div>
    <!-- Platform legend bar -->
    <div id="ctLegend" class="flex flex-wrap items-center gap-2 bg-white border border-gray-200 rounded-md px-4 py-2 mb-2 text-sm">
        <span class="font-semibold text-gray-700 mr-1">Platform Grouped</span>
        <!-- filled by JS -->
    </div>

    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-3">
        <div class="text-sm text-gray-600">Download current dashboard view as PDF.</div>
        <button type="button"
                onclick="downloadDashboardPDF()"
                class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 transition-colors">
            Download PDF
        </button>
    </div>

    <!-- Body: kiri (konten) + kanan (filter) -->
    <div class="flex gap-3 items-start w-full">

        <!-- ── LEFT: pivot 1 + bottom row ───────────────── -->
        <div class="flex-1 min-w-0 flex flex-col gap-3">

            <!-- Loading state -->
            <div id="ctLoading" class="bg-white border border-gray-200 rounded-md overflow-hidden">
                <div class="p-6 text-center">
                    <svg class="animate-spin h-6 w-6 mx-auto mb-2 text-green-600 inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                    </svg>
                    <p>Memuat data analisis...</p>
                </div>
            </div>

            <!-- Pivot 1: Process CT per Monthly -->
            <div id="ctCard1" class="bg-white border border-gray-200 rounded-md overflow-hidden" style="display:none">
                <div class="text-sm font-semibold text-gray-900 px-3 py-2 border-b border-gray-200 bg-gray-50">Process CT per Monthly</div>
                <div class="ct-tbl-wrap overflow-auto max-h-96">
                    <table class="ct-tbl" id="ctP1"><thead></thead><tbody></tbody></table>
                </div>
            </div>

            <!-- Bottom row: Pivot 2 + Chart -->
            <div id="ctBottom" class="grid grid-cols-2 gap-3" style="display:none">

                <!-- Pivot 2 -->
                <div class="bg-white border border-gray-200 rounded-md overflow-hidden">
                    <div class="text-sm font-semibold text-gray-900 px-3 py-2 border-b border-gray-200 bg-gray-50">Process per Platform</div>
                    <div class="ct-tbl-wrap" style="max-height:280px">
                        <table class="ct-tbl" id="ctP2"><thead></thead><tbody></tbody></table>
                    </div>
                </div>

                <!-- Chart -->
                <div class="bg-white border border-gray-200 rounded-md overflow-hidden">
                    <div class="text-sm font-semibold text-gray-900 px-3 py-2 border-b border-gray-200 bg-gray-50">Total Average of CT</div>
                    <div class="p-3 h-72">
                        <canvas id="ctBarCanvas"></canvas>
                    </div>
                </div>

            </div>

        </div><!-- end ct-left -->

        <!-- ── RIGHT: filter + estimasi ─────────────────── -->
        <div class="w-48 flex-shrink-0">
            <div class="bg-white border border-gray-200 rounded-md p-3 text-sm">
                <h4 class="text-sm font-semibold text-gray-700 mb-2">Filter</h4>

                <div class="ct-filter-row mb-2">
                    <label class="block text-xs text-gray-500 mb-1">Month</label>
                    <select id="ct_fm" size="4" multiple class="w-full text-sm border border-gray-300 rounded px-2 py-1">
                        {% for m in all_months %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
                    </select>
                    <p class="text-xs text-gray-400 mt-1">Ctrl+click multi</p>
                </div>

                <div class="ct-filter-row mb-2">
                    <label class="block text-xs text-gray-500 mb-1">Platform Grouped</label>
                    <select id="ct_fp" size="4" multiple class="w-full text-sm border border-gray-300 rounded px-2 py-1">
                        {% for p in all_platforms %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
                    </select>
                </div>

                <div class="ct-filter-row mb-2">
                    <label class="block text-xs text-gray-500 mb-1">Process Stage</label>
                    <select id="ct_fs" size="3" multiple class="w-full text-sm border border-gray-300 rounded px-2 py-1">
                        {% for s in all_stages %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
                    </select>
                </div>

                <div class="ct-filter-row mb-2">
                    <label class="block text-xs text-gray-500 mb-1">Process Area</label>
                    <select id="ct_fa" size="4" multiple class="w-full text-sm border border-gray-300 rounded px-2 py-1">
                        {% for a in all_areas %}<option value="{{ a }}">{{ a }}</option>{% endfor %}
                    </select>
                </div>

                <div class="ct-filter-row mb-2">
                    <label class="block text-xs text-gray-500 mb-1">Predefined Process</label>
                    <select id="ct_fpr" size="4" multiple class="w-full text-sm border border-gray-300 rounded px-2 py-1">
                        {% for pr in all_processes %}<option value="{{ pr }}">{{ pr }}</option>{% endfor %}
                    </select>
                </div>

                <button class="w-full mt-1 py-2 rounded text-sm border border-transparent bg-green-700 text-white hover:bg-green-800" onclick="ctLoad()">Apply Filter</button>
                <button class="w-full mt-1 py-2 rounded text-sm border border-gray-300 bg-white text-gray-700 hover:bg-gray-50" onclick="ctReset()">Reset</button>

                <!-- ── Estimasi CT ─────────────────────── -->
                <div class="mt-3 pt-3 border-t border-gray-200">
                    <h5 class="text-sm font-semibold text-gray-700 mb-2">🧮 Estimasi CT</h5>
                    <div class="ct-filter-row mb-2">
                        <label class="block text-xs text-gray-500 mb-1">Platform</label>
                        <select id="estPG" onchange="ctEstPlatform()" class="w-full text-sm border border-gray-300 rounded px-2 py-1">
                            <option value="">— Pilih —</option>
                            {% for p in all_platforms %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="ct-est-list border border-gray-200 rounded p-2 max-h-40 overflow-y-auto text-sm mb-2" id="estList">
                        <span class="ph text-gray-400">Pilih platform dulu</span>
                    </div>
                    <div class="ct-est-result" id="estRes" style="display:none">
                        <div class="text-xs text-gray-500">Estimasi Total CT</div>
                        <div class="text-2xl font-bold text-green-700" id="estTot">0</div>
                        <div class="text-xs text-gray-500">hari</div>
                        <div class="ct-est-bd text-xs text-gray-500" id="estBD"></div>
                    </div>
                </div>

            </div><!-- end ct-filter -->
        </div><!-- end ct-right -->

    </div><!-- end ct-body -->
</div><!-- end ctWrap -->


<script>
(function(){
let _chart=null, _estMap={};

// ── Platform colors ───────────────────────────────────────
const PG_COLORS = window.PG_COLORS = {
    'BGA':'#2563eb','SOT':'#9ca3af','QFN':'#d97706',
    'QFP':'#111827','SOP':'#dc2626','TO':'#000000',
    'Other':'#6b7280'
};
const AREA_COLORS = window.AREA_COLORS = {
    'Die Attach':'#2563eb','Wire Bond':'#16a34a','Molding':'#dc2626',
    'Trim & Form':'#d97706','Marking':'#7c3aed','Plating':'#0891b2',
    'Ball Mount':'#be185d','Quality Control':'#059669','Testing':'#ea580c',
    'Reliability Test':'#4338ca','Packing':'#0d9488','Shipment':'#b45309',
    'Wafer Preparation':'#6d28d9','Other':'#9ca3af'
};

// ── Filter helpers ────────────────────────────────────────
function sel(id){
    const el = document.getElementById(id);
    if(!el) return [];
    return Array.from(el.selectedOptions).map(o=>o.value).filter(v=>v);
}
window.ctReset=function(){
    ['ct_fm','ct_fp','ct_fs','ct_fa','ct_fpr'].forEach(id=>
        Array.from(document.getElementById(id).options).forEach(o=>o.selected=false));
    ctLoad();
};

// === DOWNLOAD PDF - VERSI YANG LEBIH AMAN ===
window.downloadDashboardPDF = function() {
    const params = new URLSearchParams();
    sel('ct_fm').forEach(v  => params.append('year',     v));
    sel('ct_fp').forEach(v  => params.append('platform', v));
    sel('ct_fs').forEach(v  => params.append('stage',    v));
    sel('ct_fa').forEach(v  => params.append('area',     v));
    sel('ct_fpr').forEach(v => params.append('process',  v));
    const qs = params.toString();
    window.location.href = '/dashboard/ct-analysis/download/pdf/' + (qs ? '?' + qs : '');
};

// ── Load data ─────────────────────────────────────────────
window.ctLoad=async function(){
    document.getElementById('ctLoading').style.display='';
    document.getElementById('ctCard1').style.display='none';
    document.getElementById('ctBottom').style.display='none';

    const p=new URLSearchParams();
    sel('ct_fm').forEach(v=>p.append('month',v));
    sel('ct_fp').forEach(v=>p.append('platform',v));
    sel('ct_fs').forEach(v=>p.append('stage',v));
    sel('ct_fa').forEach(v=>p.append('area',v));
    sel('ct_fpr').forEach(v=>p.append('process',v));

    try{
        const d=await (await fetch('/dashboard/ct-analysis/data/?'+p)).json();
        buildLegend(d.platform_groups);
        buildP1(d.pivot1, d.months, d.platform_groups);
        buildP2(d.pivot2, d.platform_groups);
        buildChart(d.chart);
        buildEst(d.pivot2);
        document.getElementById('ctLoading').style.display='none';
        document.getElementById('ctCard1').style.display='';
        document.getElementById('ctBottom').style.display='';
    }catch(e){
        document.getElementById('ctLoading').innerHTML='<p class="ct-nodata" style="color:#f87171">Gagal memuat data. Pastikan sudah sinkronisasi.</p>';
    }
};

// ── Legend ────────────────────────────────────────────────


// ── Pivot 1: Process CT per Monthly ──────────────────────
function buildP1(pivot1,months,pgs){
    const t=document.getElementById('ctP1');
    if(!pivot1||!Object.keys(pivot1).length){
        t.querySelector('thead').innerHTML='';
        t.querySelector('tbody').innerHTML='<tr><td class="ct-nodata" colspan="20">Tidak ada data</td></tr>';
        return;
    }
    // Header — Month sebagai group header
    let h='<tr>';
    h+='<th class="lh" rowspan="2" style="min-width:72px">Platform Gr.</th>';
    h+='<th class="lh" rowspan="2" style="min-width:68px">Process Sta.</th>';
    h+='<th class="lh" rowspan="2" style="min-width:80px">Process Area</th>';
    h+='<th class="lh" rowspan="2" style="min-width:120px">Predefined Pro.</th>';
    h+=`<th colspan="${months.length}" style="text-align:center;background:#e0f2fe;color:#0369a1">Month</th>`;
    h+='<th rowspan="2" style="min-width:70px;background:#dbeafe">Grand To.</th>';
    h+='</tr><tr>';
    months.forEach(m=>{
        const dt=new Date(m+'-01');
        h+=`<th style="min-width:64px;background:#f0f9ff">${dt.toLocaleString('en',{month:'short'})}</th>`;
    });
    h+='</tr>';
    t.querySelector('thead').innerHTML=h;

    let b='';
    Object.keys(pivot1).sort().forEach(pg=>{
        const stages=pivot1[pg];
        let pgR=0;
        Object.keys(stages).sort().forEach(st=>Object.keys(stages[st]).sort().forEach(ar=>{pgR+=Object.keys(stages[st][ar]).length+1;}));
        let pgF=true;
        Object.keys(stages).sort().forEach(st=>{
            const areas=stages[st];
            let stR=0; Object.keys(areas).sort().forEach(ar=>{stR+=Object.keys(areas[ar]).length+1;});
            let stF=true;
            Object.keys(areas).sort().forEach(ar=>{
                const procs=areas[ar],pks=Object.keys(procs).sort();
                let arF=true;
                const arSums={},arAll=[];
                pks.forEach(pr=>months.forEach(m=>{const v=procs[pr][m];if(v!=null){(arSums[m]=arSums[m]||[]).push(v);arAll.push(v);}}));
                pks.forEach(pr=>{
                    const d=procs[pr];
                    b+='<tr>';
                    if(pgF){b+=`<td class="lc pg-c" rowspan="${pgR}">${pg}</td>`;pgF=false;}
                    if(stF){b+=`<td class="lc" rowspan="${stR}" style="background:#fafafa">${st}</td>`;stF=false;}
                    if(arF){b+=`<td class="lc" rowspan="${pks.length+1}" style="padding-left:8px">${ar}</td>`;arF=false;}
                    b+=`<td class="lc" style="padding-left:14px">${pr}</td>`;
                    months.forEach(m=>{const v=d[m];b+=v!=null?`<td class="vc">${v}</td>`:`<td class="nc">—</td>`;});
                    const gt=d['grand_total'];b+=gt!=null?`<td class="gc">${gt}</td>`:`<td class="nc">—</td>`;
                    b+='</tr>';
                });
                // Total row
                b+='<tr class="tr"><td class="lc" style="padding-left:14px;font-style:italic">Total</td>';
                months.forEach(m=>{const vs=arSums[m]||[];const av=vs.length?r1(vs.reduce((a,b)=>a+b,0)/vs.length):null;b+=av!=null?`<td class="vc">${av}</td>`:`<td class="nc">—</td>`;});
                const gtA=arAll.length?r1(arAll.reduce((a,b)=>a+b,0)/arAll.length):null;
                b+=gtA!=null?`<td class="gc">${gtA}</td>`:`<td class="nc">—</td>`;
                b+='</tr>';
            });
        });
    });
    t.querySelector('tbody').innerHTML=b;
}

// ── Pivot 2: Process per Platform ────────────────────────
function buildP2(pivot2,pgs){
    const t=document.getElementById('ctP2');
    if(!pivot2||!Object.keys(pivot2).length){
        t.querySelector('thead').innerHTML='';
        t.querySelector('tbody').innerHTML='<tr><td class="ct-nodata" colspan="20">Tidak ada data</td></tr>';
        return;
    }
    let h='<tr>';
    h+='<th class="lh" style="min-width:80px">Process Area</th>';
    h+='<th class="lh" style="min-width:130px">Predefined Process</th>';
    // Platform group headers dengan warna
    h+=`<th colspan="${pgs.length}" style="text-align:center;background:#e0f2fe;color:#0369a1">Platform Grouped</th>`;
    h+='<th style="min-width:65px;background:#dbeafe">Grand To.</th>';
    h+='</tr><tr><th></th><th></th>';
    pgs.forEach(pg=>{
        const c=PG_COLORS[pg]||'#9ca3af';
        h+=`<th style="min-width:46px;background:${c};color:#fff">${pg}</th>`;
    });
    h+='<th style="background:#dbeafe"></th></tr>';
    t.querySelector('thead').innerHTML=h;

    let b='';
    Object.keys(pivot2).sort().forEach(ar=>{
        const procs=pivot2[ar],pks=Object.keys(procs).sort();
        let arF=true;
        pks.forEach(pr=>{
            const d=procs[pr];
            b+='<tr>';
            if(arF){b+=`<td class="lc ar2-c" rowspan="${pks.length}">${ar}</td>`;arF=false;}
            b+=`<td class="lc" style="padding-left:10px">${pr}</td>`;
            pgs.forEach(pg=>{const v=d[pg];b+=v!=null?`<td class="vc">${v}</td>`:`<td class="nc">—</td>`;});
            const gt=d['grand_total'];b+=gt!=null?`<td class="gc">${gt}</td>`:`<td class="nc">—</td>`;
            b+='</tr>';
        });
    });
    t.querySelector('tbody').innerHTML=b;
}

// ── Chart ─────────────────────────────────────────────────
function buildChart(cd){
    if(_chart){_chart.destroy();_chart=null;}
    const labels=cd.labels.map(l=>{
        if(l==='Grand Total') return 'Grand Tot.';
        try{const dt=new Date(l+'-01');return dt.toLocaleString('en',{month:'short'});}catch{return l;}
    });
    const datasets=cd.datasets.map(ds=>({
        ...ds,
        backgroundColor:(AREA_COLORS[ds.label]||'#9ca3af')+'cc',
        borderColor:AREA_COLORS[ds.label]||'#9ca3af',
        borderWidth:1,
    }));
    _chart=new Chart(document.getElementById('ctBarCanvas'),{
        type:'bar',
        data:{labels,datasets},
        options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:10,padding:6}}},
            scales:{
                x:{stacked:true,ticks:{font:{size:10}},title:{display:true,text:'Month',font:{size:10}}},
                y:{stacked:true,title:{display:true,text:'final ct',font:{size:10}},ticks:{font:{size:10}}}
            }
        }
    });
}

// ── Estimasi ──────────────────────────────────────────────
function buildEst(pivot2){
    _estMap={};
    if(!pivot2) return;
    Object.values(pivot2).forEach(procs=>Object.entries(procs).forEach(([pr,pgD])=>Object.entries(pgD).forEach(([pg,v])=>{
        if(pg==='grand_total') return;
        (_estMap[pg]=_estMap[pg]||{})[pr]=v;
    })));
}
window.ctEstPlatform=function(){
    const pg=document.getElementById('estPG').value,box=document.getElementById('estList');
    document.getElementById('estRes').style.display='none';
    if(!pg||!_estMap[pg]){box.innerHTML='<span class="ph">Pilih platform dulu</span>';return;}
    box.innerHTML='';
    Object.entries(_estMap[pg]).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([pr,ct])=>{
        const uid='ep_'+pr.replace(/\W/g,'_');
        const d=document.createElement('div');
        d.className='ct-est-item';
        d.innerHTML=`<input type="checkbox" id="${uid}" value="${pr}" data-ct="${ct}" onchange="ctCalcEst()"><label for="${uid}">${pr} <span class="ct-v">(${ct})</span></label>`;
        box.appendChild(d);
    });
};
window.ctCalcEst=function(){
    const cks=document.querySelectorAll('#estList input:checked');
    const res=document.getElementById('estRes');
    if(!cks.length){res.style.display='none';return;}
    let tot=0,bh='';
    cks.forEach(c=>{const ct=parseFloat(c.dataset.ct)||0;tot+=ct;bh+=`<div>• ${c.value}: <b>${ct}</b> hr</div>`;});
    document.getElementById('estTot').textContent=tot.toFixed(1);
    document.getElementById('estBD').innerHTML=bh;
    res.style.display='';
};

function r1(v){return Math.round(v*10)/10;}
document.addEventListener('DOMContentLoaded',ctLoad);
})();
</script>
