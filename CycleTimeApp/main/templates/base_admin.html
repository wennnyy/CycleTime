<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cycle Time System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="flex min-h-screen">

<!-- Sidebar -->
<div class="w-64 bg-green-800 text-white min-h-screen flex flex-col">

    <!-- Logo -->
    <div class="p-5 border-b border-green-700">
        <h2 class="text-lg font-bold">Cycle Time System</h2>
        <p class="text-xs text-green-200">Infineon Batam</p>
    </div>

    <!-- Menu -->
    <div class="flex-1 p-4 space-y-2">

        <a href="{% url 'dashboard_admin' %}"
           class="block px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/' %}bg-black text-white{% endif %}">
            Dashboard
        </a>

        <a href="{% url 'admin_sync' %}"
           class="block px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/sync/' %}bg-black text-white{% endif %}">
            Synchronization
        </a>

        <a href="{% url 'admin_data' %}"
           class="block px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/data/' %}bg-black text-white{% endif %}">
            Data Management
        </a>

        <a href="{% url 'admin_users' %}"
           class="block px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/users/' %}bg-black text-white{% endif %}">
            User Management
        </a>

        <a href="{% url 'admin_reports' %}"
           class="block px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/reports/' %}bg-black text-white{% endif %}">
            Reports
        </a>

    </div>

    <!-- User Info -->
    <div class="p-4 border-t border-green-700 text-sm">
        <p>Login sebagai:</p>
        <p class="font-semibold">{{ request.user.username }}</p>
        <p class="text-xs text-green-200 mb-2">{{ request.user.role }}</p>
        <a href="{% url 'logout' %}" class="underline">Logout</a>
    </div>

</div>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-8">
        {% block content %}
        {% endblock %}
    </main>

</div>

</body>
</html>
