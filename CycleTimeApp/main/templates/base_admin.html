<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cycle Time System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="flex min-h-screen">

<!-- Sidebar -->
<div id="sidebar" class="w-64 bg-green-800 text-white min-h-screen flex flex-col flex-shrink-0 transition-all duration-300" style="transition: width 0.3s, min-width 0.3s;">

    <!-- Logo + Toggle Button -->
    <div class="p-5 border-b border-green-700 flex items-center justify-between">
        <div id="sidebarLogo">
            <h2 class="text-lg font-bold whitespace-nowrap">Cycle Time System</h2>
            <p class="text-xs text-green-200">Infineon Batam</p>
        </div>
        <button id="sidebarToggle" onclick="toggleSidebar()"
            class="ml-2 flex-shrink-0 p-1.5 rounded-md hover:bg-green-700 transition text-white focus:outline-none"
            title="Toggle Sidebar">
            <svg id="iconOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7M18 19l-7-7 7-7"/>
            </svg>
            <svg id="iconClose" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M6 5l7 7-7 7"/>
            </svg>
        </button>
    </div>

    <!-- Menu -->
    <div id="sidebarMenu" class="flex-1 p-4 space-y-2">
        <a href="{% url 'dashboard_admin' %}"
           class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/' %}bg-black text-white{% endif %}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span class="sidebar-label whitespace-nowrap">Dashboard</span>
        </a>

        <a href="{% url 'admin_sync' %}"
           class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/sync/' %}bg-black text-white{% endif %}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            <span class="sidebar-label whitespace-nowrap">Synchronization</span>
        </a>

        <a href="{% url 'admin_data' %}"
           class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/data/' %}bg-black text-white{% endif %}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
            </svg>
            <span class="sidebar-label whitespace-nowrap">Data Management</span>
        </a>

        <a href="{% url 'admin_users' %}"
           class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/users/' %}bg-black text-white{% endif %}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            <span class="sidebar-label whitespace-nowrap">User Management</span>
        </a>

        <a href="{% url 'admin_reports' %}"
           class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-700
           {% if request.path == '/dashboard/admin/reports/' %}bg-black text-white{% endif %}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span class="sidebar-label whitespace-nowrap">Reports</span>
        </a>
    </div>

    <!-- User Info -->
    <div id="sidebarUser" class="p-4 border-t border-green-700 text-sm">
        <div class="sidebar-label">
            <p class="text-green-200 text-xs">Login sebagai:</p>
            <p class="font-semibold">{{ request.user.username }}</p>
            <p class="text-xs text-green-200 mb-2">{{ request.user.role }}</p>
            <a href="{% url 'logout' %}" class="underline text-green-200 hover:text-white text-xs">Logout</a>
        </div>
        <div class="sidebar-icon-only hidden">
            <a href="{% url 'logout' %}" title="Logout"
               class="flex items-center justify-center p-1.5 rounded hover:bg-green-700 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
            </a>
        </div>
    </div>

</div>

    <!-- Main Content -->
    <main id="mainContent" class="flex-1 p-6 md:p-8 min-w-0 overflow-x-hidden" style="width:calc(100vw - 16rem); transition: width 0.3s;">
        {% block content %}
        {% endblock %}
    </main>

</div>

<script>
function toggleSidebar() {
    const sidebar   = document.getElementById('sidebar');
    const main      = document.getElementById('mainContent');
    const logo      = document.getElementById('sidebarLogo');
    const menu      = document.getElementById('sidebarMenu');
    const iconOpen  = document.getElementById('iconOpen');
    const iconClose = document.getElementById('iconClose');
    const labels    = document.querySelectorAll('.sidebar-label');
    const iconOnly  = document.querySelectorAll('.sidebar-icon-only');
    const isCollapsed = sidebar.classList.contains('collapsed');

    if (isCollapsed) {
        // Expand
        sidebar.classList.remove('collapsed');
        sidebar.style.width = '16rem';
        sidebar.style.minWidth = '16rem';
        main.style.width = 'calc(100vw - 16rem)';
        logo.classList.remove('hidden');
        iconOpen.classList.remove('hidden');
        iconClose.classList.add('hidden');
        labels.forEach(el => el.classList.remove('hidden'));
        iconOnly.forEach(el => el.classList.add('hidden'));
        menu.classList.remove('flex', 'flex-col', 'items-center');
        menu.querySelectorAll('a').forEach(a => {
            a.classList.remove('justify-center');
            a.classList.add('gap-3');
        });
        localStorage.setItem('sidebarCollapsed', '0');
    } else {
        // Collapse
        sidebar.classList.add('collapsed');
        sidebar.style.width = '4rem';
        sidebar.style.minWidth = '4rem';
        main.style.width = 'calc(100vw - 4rem)';
        logo.classList.add('hidden');
        iconOpen.classList.add('hidden');
        iconClose.classList.remove('hidden');
        labels.forEach(el => el.classList.add('hidden'));
        iconOnly.forEach(el => el.classList.remove('hidden'));
        menu.classList.add('flex', 'flex-col', 'items-center');
        menu.querySelectorAll('a').forEach(a => {
            a.classList.add('justify-center');
            a.classList.remove('gap-3');
        });
        localStorage.setItem('sidebarCollapsed', '1');
    }
}

// Restore state on page load
document.addEventListener('DOMContentLoaded', function() {
    if (localStorage.getItem('sidebarCollapsed') === '1') {
        // Langsung collapse tanpa animasi saat load
        const sidebar   = document.getElementById('sidebar');
        sidebar.style.transition = 'none';
        toggleSidebar();
        setTimeout(() => { sidebar.style.transition = ''; }, 50);
    }
});
</script>

<script>
(function(){
    function _fillSel(id, items, keepVal) {
        var sel = document.getElementById(id);
        if (!sel) return;
        var prev = keepVal ? sel.value : '';
        while (sel.options.length > 1) sel.remove(1);
        (items || []).forEach(function(v) {
            var o = document.createElement('option');
            o.value = v; o.textContent = v; sel.appendChild(o);
        });
        if (prev) sel.value = prev;
    }

    window.ctFillFilterDropdowns = function(data) {
        _fillSel('ct_fp_single', data.platform_groups || [], true);
        _fillSel('ct_fa_single', data.all_areas       || [], true);
        _fillSel('ct_fpr_single', data.all_processes   || [], true);
    };

    window.ctApplySingle = function() {
        var p = new URLSearchParams();
        var g  = function(id) { var e = document.getElementById(id); return e ? e.value : ''; };
        var gm = function(id) { var e = document.getElementById(id); return e ? Array.from(e.selectedOptions).map(function(o){return o.value;}).filter(function(v){return v;}) : []; };
        if (g('ct_fy'))         p.append('year',     g('ct_fy'));
        if (g('ct_fp_single'))  p.append('platform', g('ct_fp_single'));
        if (g('ct_fs_single'))  p.append('stage',    g('ct_fs_single'));
        if (g('ct_fa_single'))  p.append('area',     g('ct_fa_single'));
        if (g('ct_fpr_single')) p.append('process',  g('ct_fpr_single'));
        gm('ct_fp').forEach(function(v){p.append('platform',v);});
        gm('ct_fs').forEach(function(v){p.append('stage',v);});
        gm('ct_fa').forEach(function(v){p.append('area',v);});
        gm('ct_fpr').forEach(function(v){p.append('process',v);});
        if (typeof window.ctFetch === 'function') window.ctFetch(p);
    };

    window.ctResetSingle = function() {
        ['ct_fy','ct_fp_single','ct_fs_single','ct_fa_single','ct_fpr_single'].forEach(function(id) {
            var e = document.getElementById(id); if (e) e.value = '';
        });
        ['ct_fm','ct_fp','ct_fs','ct_fa','ct_fpr'].forEach(function(id) {
            var e = document.getElementById(id); if(e) Array.from(e.options).forEach(function(o){o.selected=false;});
        });
        if (typeof window.ctFetch === 'function') window.ctFetch(new URLSearchParams());
    };

    window.buildLegend = function(pgs, fullData) {
        if (typeof window.ctFillFilterDropdowns === 'function') {
            window.ctFillFilterDropdowns({
                platform_groups: pgs,
                all_areas:       fullData ? fullData.all_areas    || [] : [],
                all_processes:   fullData ? fullData.all_processes|| [] : [],
            });
        }
        var colors = typeof PG_COLORS !== 'undefined' ? PG_COLORS : (typeof PG_C !== 'undefined' ? PG_C : {});
        var el = document.getElementById('ctLegend');
        if (!el) return;
        var h = '<span class="font-semibold text-gray-700 mr-1">Platform Grouped</span>';
        (pgs||[]).forEach(function(pg){
            var c = colors[pg] || '#9ca3af';
            h += '<span class="flex items-center gap-2 text-gray-700 mr-2"><span class="w-3 h-3 rounded-sm inline-block" style="background:' + c + '"></span>' + pg + '</span>';
        });
        el.innerHTML = h;
    };

    function gsel(id) {
        var el = document.getElementById(id);
        return el ? Array.from(el.selectedOptions).map(function(o){return o.value;}).filter(function(v){return v;}) : [];
    }

    window.ctApply = function() {
        var p = new URLSearchParams();
        var fy = document.getElementById('ct_fy'); if (fy && fy.value) p.append('year', fy.value);
        gsel('ct_fm').forEach(function(v){p.append('month', v);});
        gsel('ct_fp').forEach(function(v){p.append('platform', v);});
        gsel('ct_fs').forEach(function(v){p.append('stage', v);});
        gsel('ct_fa').forEach(function(v){p.append('area', v);});
        gsel('ct_fpr').forEach(function(v){p.append('process', v);});
        var fps = document.getElementById('ct_fp_single'); if (fps && fps.value) p.append('platform', fps.value);
        var fss = document.getElementById('ct_fs_single'); if (fss && fss.value) p.append('stage', fss.value);
        var fas = document.getElementById('ct_fa_single'); if (fas && fas.value) p.append('area', fas.value);
        var fprs = document.getElementById('ct_fpr_single'); if (fprs && fprs.value) p.append('process', fprs.value);
        if (typeof window.ctFetch === 'function') window.ctFetch(p);
    };

    window.ctReset = function() {
        ['ct_fm','ct_fp','ct_fs','ct_fa','ct_fpr'].forEach(function(id){
            var el = document.getElementById(id); if (el) Array.from(el.options).forEach(function(o){o.selected = false;});
        });
        ['ct_fy','ct_fp_single','ct_fs_single','ct_fa_single','ct_fpr_single'].forEach(function(id){
            var el = document.getElementById(id); if (el) el.value = '';
        });
        if (typeof window.ctFetch === 'function') window.ctFetch(new URLSearchParams());
    };
})();
</script>

</body>
</html>
